<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no"><title>HQ - Command Center</title><link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#0a0d08"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="/icon-192.png"><link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"><script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c1008;--sf:rgba(70,90,55,0.12);--bd:rgba(100,130,75,0.35);--bl:rgba(100,130,75,0.2);--tx:#d8e0d2;--th:#f0f4ec;--dm:rgba(210,220,200,0.6);--dr:rgba(210,220,200,0.35);--ac:#a4c48a;--ah:#bfdfaa;--gd:#dbb96a;--rd:#c47060;--gn:#82b06a;--bl2:#72a0b8;--pr:#9488aa}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::selection{background:rgba(164,196,138,0.35)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(164,196,138,0.3);border-radius:3px}
.topbar{padding:14px 28px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:rgba(70,90,55,0.08);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:20px}
.logo{font-family:'Share Tech Mono',monospace;font-weight:700;font-size:28px;letter-spacing:8px;color:var(--ah)}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:4px;color:var(--dm);text-transform:uppercase}
.date-display{font-size:14px;color:var(--dm);font-family:'Share Tech Mono',monospace;letter-spacing:1px}
.focus-bar{display:flex;align-items:center;gap:16px;border:1px solid var(--bd);padding:10px 20px;background:rgba(70,90,55,0.08)}
.focus-ind{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.focus-label{font-size:11px;letter-spacing:3px;font-family:'Share Tech Mono',monospace;color:var(--dm);text-transform:uppercase}
.focus-theme{font-size:16px;font-weight:600;color:var(--th);margin-top:1px}
.next-up{display:flex;align-items:center;gap:10px;border:1px solid var(--bl);padding:8px 16px;background:rgba(70,90,55,0.06);margin-left:8px}
.next-up-label{font-size:10px;letter-spacing:2px;font-family:'Share Tech Mono',monospace;color:var(--dm);text-transform:uppercase}
.next-up-val{font-size:14px;color:var(--th);font-weight:500}
.next-up-time{font-size:12px;color:var(--gd);font-family:'Share Tech Mono',monospace;font-weight:600}
.tab-nav{display:flex;padding:0 28px;border-bottom:1px solid var(--bl);flex-shrink:0;background:rgba(70,90,55,0.04)}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dm);padding:13px 22px;cursor:pointer;font-size:13px;font-family:'Share Tech Mono',monospace;font-weight:700;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.tab-btn:hover{color:var(--tx);background:rgba(70,90,55,0.08)}
.tab-btn.active{border-bottom-color:var(--ac);color:var(--ah);background:rgba(70,90,55,0.1)}
.tab-btn i{width:15px;height:15px;stroke-width:2}
.content{flex:1;overflow:hidden;padding:16px 24px}
.panel{background:var(--sf);border:1px solid var(--bl);padding:20px;height:100%;overflow:hidden;display:flex;flex-direction:column}
.stitle{font-size:13px;font-family:'Share Tech Mono',monospace;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;flex-shrink:0;color:var(--ac);display:flex;align-items:center;gap:10px}
.stitle.gold{color:var(--gd)}
.stitle i{width:16px;height:16px;stroke-width:2.5}
.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;height:100%}
.nmitem{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bl)}.nmitem:last-child{border-bottom:none}
.nmbullet{color:var(--gd);font-family:'Share Tech Mono',monospace;font-size:15px;flex-shrink:0;margin-top:2px}
.nmtext{flex:1;font-size:16px;line-height:1.5;color:var(--th)}
.nmrm{background:none;border:none;color:var(--dr);cursor:pointer;font-size:14px;opacity:0;font-family:'Share Tech Mono',monospace}.nmitem:hover .nmrm{opacity:1}
.nminput{width:100%;background:rgba(164,196,138,0.08);border:1px solid var(--bl);color:var(--tx);padding:9px 12px;font-size:15px;font-family:'IBM Plex Sans',sans-serif;outline:none;margin-top:8px}.nminput:focus{border-color:var(--gd)}.nminput::placeholder{color:var(--dr)}
.nirow{display:flex;gap:10px;margin-bottom:14px;flex-shrink:0}
.nta{flex:1;background:rgba(164,196,138,0.08);border:1px solid var(--bl);color:var(--tx);padding:12px 14px;font-size:15px;font-family:'IBM Plex Sans',sans-serif;resize:none;outline:none}.nta:focus{border-color:var(--ac)}.nta::placeholder{color:var(--dr)}
.nadd{background:rgba(164,196,138,0.12);border:1px solid var(--bd);color:var(--ac);padding:0 18px;cursor:pointer;font-size:22px;font-family:'Share Tech Mono',monospace}.nadd:hover{background:rgba(164,196,138,0.22)}
.ngrid{flex:1;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start}.ngrid.c3{grid-template-columns:1fr 1fr 1fr}
.snote{padding:12px 14px;position:relative;border-left:3px solid}.snote:hover{background:rgba(255,255,255,0.03)}
.sntxt{font-size:15px;line-height:1.6;outline:none;min-height:30px;word-break:break-word}
.snrm{position:absolute;top:5px;right:8px;background:none;border:none;cursor:pointer;font-size:14px;opacity:0;font-family:'Share Tech Mono',monospace}.snote:hover .snrm{opacity:0.6}
.sntime{font-size:11px;opacity:0.5;margin-top:6px;font-family:'Share Tech Mono',monospace}
.ubtn{background:rgba(164,196,138,0.12);border:1px solid var(--bd);color:var(--ac);padding:9px 18px;cursor:pointer;font-size:12px;font-family:'Share Tech Mono',monospace;font-weight:600;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}.ubtn:hover{background:rgba(164,196,138,0.22)}.ubtn i{width:14px;height:14px}
.vhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0}
.vempty{flex:1;display:flex;align-items:center;justify-content:center;border:1px dashed var(--bd);flex-direction:column;gap:14px;cursor:pointer}.vempty:hover{border-color:var(--ac)}
.vetxt{color:var(--dr);font-size:15px;font-family:'Share Tech Mono',monospace;letter-spacing:3px;text-transform:uppercase}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));grid-auto-rows:200px;gap:10px}
.vitem{position:relative;overflow:hidden;border:1px solid var(--bl)}.vitem:hover{border-color:var(--ac)}
.vimg{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(0.7)contrast(1.1)}
.vrm{position:absolute;top:6px;right:6px;background:rgba(10,13,8,0.75);border:1px solid var(--bd);color:var(--rd);width:26px;height:26px;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace}.vitem:hover .vrm{display:flex}
.cidea-form{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--bl);flex-shrink:0}
.cidea-title{background:rgba(164,196,138,0.08);border:1px solid var(--bl);color:var(--th);padding:10px 14px;font-size:17px;font-family:'IBM Plex Sans',sans-serif;font-weight:600;outline:none}.cidea-title:focus{border-color:var(--ac)}.cidea-title::placeholder{color:var(--dr);font-weight:400}
.cidea-desc{background:rgba(164,196,138,0.08);border:1px solid var(--bl);color:var(--tx);padding:10px 14px;font-size:15px;font-family:'IBM Plex Sans',sans-serif;resize:none;outline:none}.cidea-desc:focus{border-color:var(--ac)}.cidea-desc::placeholder{color:var(--dr)}
.cidea-form-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.cidea-tags{display:flex;gap:4px;flex-wrap:wrap}
.cidea-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.cidea-item{background:rgba(70,90,55,0.1);border:1px solid var(--bl);border-left:3px solid var(--ac);padding:14px 16px}.cidea-item:hover{background:rgba(70,90,55,0.16)}
.cidea-item-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.cidea-item-title{font-size:17px;font-weight:600;color:var(--th);line-height:1.4}
.cidea-item-meta{display:flex;align-items:center;gap:10px}
.cidea-item-tag{font-size:11px;padding:2px 8px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;border:1px solid;text-transform:uppercase}
.cidea-item-rm{background:none;border:none;color:var(--dr);cursor:pointer;font-size:16px;opacity:0;font-family:'Share Tech Mono',monospace}.cidea-item:hover .cidea-item-rm{opacity:1}
.cidea-item-desc{font-size:15px;color:var(--tx);line-height:1.6;margin-top:8px;opacity:0.85}
.cidea-item-time{font-size:11px;color:var(--dm);font-family:'Share Tech Mono',monospace;margin-top:10px}
.tagbtns{display:flex;gap:4px;flex-wrap:wrap}
.tagb{padding:4px 10px;cursor:pointer;font-size:11px;font-family:'Share Tech Mono',monospace;font-weight:600;letter-spacing:1px;background:transparent;border:1px solid var(--bl);color:var(--dm);text-transform:uppercase}.tagb.sel{font-weight:700}
/* SCHEDULE single day */
.sched-wrap{display:flex;height:100%;gap:14px}
.sched-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sched-day-nav{display:flex;gap:0;flex-shrink:0;margin-bottom:12px}
.sched-day-pill{padding:11px 0;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--dm);background:transparent;border:none;border-bottom:3px solid transparent;flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.sched-day-pill:hover{color:var(--th);background:rgba(70,90,55,0.08)}
.sched-day-pill.active{color:var(--ah);border-bottom-color:var(--ac);background:rgba(70,90,55,0.1)}
.sched-day-pill.is-today{color:var(--gd)}.sched-day-pill.is-today.active{color:var(--ah)}
.sched-day-pill-sub{font-size:10px;color:var(--dr)}.sched-day-pill.active .sched-day-pill-sub{color:var(--dm)}
.sched-day-title{display:flex;align-items:center;gap:16px;margin-bottom:10px;flex-shrink:0}
.sched-day-name{font-family:'Share Tech Mono',monospace;font-size:20px;letter-spacing:4px;color:var(--th);text-transform:uppercase}
.sched-day-directive{font-size:14px;color:var(--dm);font-family:'Share Tech Mono',monospace;letter-spacing:2px;cursor:pointer;padding:2px 8px;border:1px solid transparent}.sched-day-directive:hover{border-color:var(--bl)}
.sched-today-badge{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:3px 12px;color:var(--ah);border:1px solid var(--ac);background:rgba(164,196,138,0.12);text-transform:uppercase}
.sched-theme-input{background:rgba(164,196,138,0.12);border:1px solid var(--ac);color:var(--th);padding:4px 10px;font-size:14px;font-family:'Share Tech Mono',monospace;outline:none;width:240px;text-transform:uppercase}
.sched-grid-wrap{flex:1;overflow-y:auto;position:relative}
.sched-grid{position:relative}
.sched-hour-row{display:flex;height:60px;border-bottom:1px solid rgba(100,130,75,0.12)}.sched-hour-row:nth-child(even){background:rgba(70,90,55,0.03)}
.sched-time-label{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--dm);width:70px;flex-shrink:0;padding:4px 12px 0 0;text-align:right;border-right:1px solid var(--bl)}
.sched-hour-cell{flex:1;cursor:pointer}.sched-hour-cell:hover{background:rgba(164,196,138,0.06)}
.sched-block{position:absolute;left:78px;right:12px;border-left:4px solid;padding:8px 14px;cursor:pointer;z-index:2;overflow:hidden;display:flex;align-items:flex-start;gap:10px}.sched-block:hover{filter:brightness(1.15);transform:translateX(2px)}
.sched-block-body{flex:1;min-width:0}
.sched-block-title{font-weight:600;font-size:15px;color:var(--th);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-block-meta{display:flex;align-items:center;gap:10px;margin-top:3px;flex-wrap:wrap}
.sched-block-time{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dm)}
.sched-block-cat{font-family:'Share Tech Mono',monospace;font-size:10px;padding:2px 8px;border:1px solid;text-transform:uppercase}
.sched-block-note-ind{font-size:11px;color:var(--gd);font-family:'Share Tech Mono',monospace;padding:2px 8px;border:1px solid rgba(219,185,106,0.25);background:rgba(219,185,106,0.08)}
.sched-block-actions{display:flex;gap:4px;flex-shrink:0;opacity:0}.sched-block:hover .sched-block-actions{opacity:1}
.sched-block-btn{background:none;border:none;color:var(--dm);cursor:pointer;font-size:14px;font-family:'Share Tech Mono',monospace}.sched-block-btn.rm:hover{color:var(--rd)}
.sched-now-line{position:absolute;left:70px;right:0;height:2px;background:var(--rd);z-index:4;pointer-events:none}
.sched-now-dot{position:absolute;left:-5px;top:-4px;width:10px;height:10px;background:var(--rd);border-radius:50%;box-shadow:0 0 10px rgba(196,112,96,0.5)}
.sched-now-time{position:absolute;left:-68px;top:-7px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--rd);font-weight:700}
.sched-side{width:280px;display:flex;flex-direction:column;gap:12px;flex-shrink:0;overflow-y:auto}
.sched-side-panel{background:var(--sf);border:1px solid var(--bl);padding:16px;display:flex;flex-direction:column}
.sched-cat{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border:1px solid transparent;font-size:13px}.sched-cat:hover{background:rgba(70,90,55,0.1)}.sched-cat.sel{border-color:var(--bd);background:rgba(70,90,55,0.14)}
.sched-cat-dot{width:12px;height:12px;flex-shrink:0;border-radius:2px}
.sched-cat-name{font-family:'Share Tech Mono',monospace;letter-spacing:2px;text-transform:uppercase;font-size:12px}
.sched-cat-rm{background:none;border:none;color:var(--dr);cursor:pointer;font-size:12px;margin-left:auto;opacity:0;font-family:'Share Tech Mono',monospace}.sched-cat:hover .sched-cat-rm{opacity:0.7}
.sched-cat-edit-input{background:rgba(164,196,138,0.1);border:1px solid var(--ac);color:var(--th);padding:3px 8px;font-size:12px;font-family:'Share Tech Mono',monospace;outline:none;text-transform:uppercase;width:120px}
.sched-add-cat{display:flex;gap:6px;margin-top:6px;padding-top:8px;border-top:1px solid var(--bl)}
.sched-add-cat-input{flex:1;background:rgba(164,196,138,0.08);border:1px solid var(--bl);color:var(--tx);padding:6px 10px;font-size:12px;font-family:'Share Tech Mono',monospace;outline:none;text-transform:uppercase}.sched-add-cat-input:focus{border-color:var(--ac)}.sched-add-cat-input::placeholder{color:var(--dr);text-transform:none}
.sched-add-cat-btn{background:rgba(164,196,138,0.12);border:1px solid var(--bd);color:var(--ac);padding:4px 10px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:14px}.sched-add-cat-btn:hover{background:rgba(164,196,138,0.22)}
.sched-add-form{display:flex;flex-direction:column;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bl)}
.sched-input{background:rgba(164,196,138,0.08);border:1px solid var(--bl);color:var(--tx);padding:9px 10px;font-size:14px;font-family:'IBM Plex Sans',sans-serif;outline:none}.sched-input:focus{border-color:var(--ac)}.sched-input::placeholder{color:var(--dr)}
.sched-input-row{display:flex;gap:6px}
.sched-input-row select{background:rgba(164,196,138,0.08);border:1px solid var(--bl);color:var(--tx);padding:7px 8px;font-size:12px;font-family:'Share Tech Mono',monospace;outline:none;flex:1;cursor:pointer;appearance:none}
.sched-input-row select option{background:#0c1008;color:var(--tx)}
.day-toggle{display:inline-block;padding:5px 10px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dm);border:1px solid var(--bl);margin:2px;user-select:none}.day-toggle:hover{border-color:var(--bd);color:var(--th)}.day-toggle.on{border-color:var(--ac);color:var(--ah);background:rgba(164,196,138,0.15)}
.sched-util{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.sched-util-row{display:flex;justify-content:space-between;font-size:12px}
.sched-util-label{color:var(--dm);font-family:'Share Tech Mono',monospace}
.sched-util-val{color:var(--th);font-family:'Share Tech Mono',monospace;font-weight:600}
.sched-util-bar{height:4px;background:rgba(164,196,138,0.12);margin-top:2px;border-radius:2px}
.sched-util-fill{height:100%;border-radius:2px}
/* WEEK CALENDAR */
.wcal-wrap{height:100%}
.wcal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0}
.wcal-nav{display:flex;align-items:center;gap:14px}
.wcal-nav-btn{background:none;border:1px solid var(--bl);color:var(--dm);width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:18px}.wcal-nav-btn:hover{border-color:var(--ac);color:var(--ah)}
.wcal-range{font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:3px;color:var(--th);text-transform:uppercase;min-width:260px;text-align:center}
.wcal-today-btn{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;background:rgba(164,196,138,0.1);border:1px solid var(--bd);color:var(--ac);padding:7px 16px;cursor:pointer;text-transform:uppercase}.wcal-today-btn:hover{background:rgba(164,196,138,0.2)}
.wcal-grid-wrap{flex:1;overflow-y:auto;overflow-x:auto;position:relative}
.wcal-grid{display:flex;min-width:700px;position:relative}
.wcal-time-col{width:60px;flex-shrink:0}
.wcal-time-hdr{position:sticky;top:0;z-index:6;background:var(--bg);border-bottom:1px solid var(--bl);border-right:1px solid var(--bl);height:58px}
.wcal-day-col{flex:1;position:relative;min-width:0;border-right:1px solid rgba(100,130,75,0.08)}
.wcal-day-hdr{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--bl);padding:8px 6px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--dm);text-transform:uppercase;cursor:pointer;height:58px}
.wcal-day-hdr:hover{background:rgba(70,90,55,0.06)}
.wcal-day-hdr.is-today{color:var(--ah);border-bottom-color:var(--ac)}
.wcal-day-hdr-date{font-size:18px;font-weight:700;display:block;margin-top:2px;color:var(--th)}
.wcal-day-hdr.is-today .wcal-day-hdr-date{color:var(--ah)}
.wcal-day-hdr-theme{font-size:9px;letter-spacing:1px;color:var(--dr);display:block;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wcal-time{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dm);padding:2px 8px 0 0;text-align:right;border-right:1px solid var(--bl);height:30px}
.wcal-time.on-hour{color:var(--tx)}
.wcal-cell{height:30px;border-bottom:1px solid rgba(100,130,75,0.06);cursor:pointer}
.wcal-cell:hover{background:rgba(164,196,138,0.04)}
.wcal-cell.on-hour{border-bottom-color:rgba(100,130,75,0.15)}
.wcal-day-col.is-today .wcal-cell{background:rgba(164,196,138,0.03)}
.wcal-evt{position:absolute;left:2px;right:2px;border-left:3px solid var(--gd);background:rgba(219,185,106,0.12);padding:2px 6px;z-index:3;overflow:hidden;cursor:pointer;font-size:11px;color:var(--th);font-weight:500}
.wcal-evt:hover{filter:brightness(1.2)}
.wcal-evt-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wcal-evt-recur{font-size:9px;color:var(--gd)}
.wcal-blk{position:absolute;left:2px;right:2px;border-left:3px solid;padding:2px 6px;z-index:2;overflow:hidden;font-size:11px;color:var(--th)}
.wcal-blk-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.wcal-now-line{position:absolute;left:0;right:0;height:2px;background:var(--rd);z-index:8;pointer-events:none}
.wcal-now-dot{position:absolute;left:-5px;top:-4px;width:10px;height:10px;background:var(--rd);border-radius:50%;box-shadow:0 0 10px rgba(196,112,96,0.5)}
/* week cal sidebar */
.wcal-side{width:260px;display:flex;flex-direction:column;gap:12px;flex-shrink:0;overflow-y:auto}
.wcal-side-panel{background:var(--sf);border:1px solid var(--bl);padding:16px;display:flex;flex-direction:column}
.wcal-add-form{display:flex;flex-direction:column;gap:6px}
.wcal-add-row{display:flex;gap:6px}

function editNote(id,txt){var n=S.notes.find(function(x){return x.id===id});if(n&&txt.trim()){n.text=txt.trim();save()}}
function rmNote(id){S.notes=S.notes.filter(function(x){return x.id!==id});save();R()}
function addNM(){var inp=document.getElementById("nmInput");if(!inp||!inp.value.trim())return;S.needleMovers.push({id:mid(),text:inp.value.trim()});inp.value="";save();renderNM();renderBottom()}
function rmNM(id){S.needleMovers=S.needleMovers.filter(function(x){return x.id!==id});save();renderNM();renderBottom()}
function rmImg(id){S.images=S.images.filter(function(x){return x.id!==id});save();R()}
function handleUpload(event){var files=Array.from(event.target.files);var done=0;files.forEach(function(file){var reader=new FileReader();reader.onload=function(ev){var img=new Image();img.onload=function(){var canvas=document.createElement("canvas");var MAX=500;var w=img.width,h=img.height;if(w>MAX||h>MAX){if(w>h){h=(h/w)*MAX;w=MAX}else{w=(w/h)*MAX;h=MAX}}canvas.width=w;canvas.height=h;canvas.getContext("2d").drawImage(img,0,0,w,h);S.images.push({id:mid(),src:canvas.toDataURL("image/jpeg",0.7),cap:file.name.replace(/\.[^.]+$/,"").toUpperCase()});done++;if(done===files.length){save();R()}};img.src=ev.target.result};reader.readAsDataURL(file)});event.target.value=""}
function addContent(){var ti=document.getElementById("ciTitle");var de=document.getElementById("ciDesc");if(!ti||!ti.value.trim())return;S.contentIdeas.unshift({id:mid(),title:ti.value.trim(),desc:de?de.value.trim():"",tag:S.ciTag,ca:Date.now()});ti.value="";if(de)de.value="";S.ciTag=null;save();R()}
function rmContent(id){S.contentIdeas=S.contentIdeas.filter(function(x){return x.id!==id});save();R()}

/* BINDINGS */
document.getElementById("niCmd").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addNote("niCmd")}});
document.getElementById("niFull").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addNote("niFull")}});
document.getElementById("nmInput").addEventListener("keydown",function(e){if(e.key==="Enter")addNM()});
document.getElementById("schedTitle").addEventListener("keydown",function(e){if(e.key==="Enter")addSchedBlock()});
document.getElementById("schedNewCatName").addEventListener("keydown",function(e){if(e.key==="Enter")addSchedCat()});
document.getElementById("wcalEvtTitle").addEventListener("keydown",function(e){if(e.key==="Enter")addWcalEvt()});
document.getElementById("ciTitle").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("ciDesc").focus()}});
document.getElementById("ciDesc").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addContent()}});
document.getElementById("projTitle").addEventListener("keydown",function(e){if(e.key==="Enter"){e.preventDefault();document.getElementById("projDesc").focus()}});
document.getElementById("projDesc").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();document.getElementById("projLink").focus()}});
document.getElementById("projLink").addEventListener("keydown",function(e){if(e.key==="Enter")addProject()});
document.addEventListener("keydown",function(e){if(e.key==="Escape"&&activeBlockId)closeBlockPopup()});
function R(){renderTop();renderNM();renderNotes();renderVision();renderContent();renderProjects();renderBottom();try{lucide.createIcons()}catch(e){}}
initSchedSelects();load();R();
setInterval(renderTop,60000);
</script>
</body></html>
